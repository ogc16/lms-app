<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS BIT 2324 - Study App</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.app{max-width:1100px;margin:0 auto;padding:20px}
header{background:linear-gradient(135deg,#1e3a5f,#0ea5e9);padding:24px 32px;border-radius:16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:1.5rem;font-weight:700}
header p{font-size:.85rem;opacity:.85;margin-top:4px}
.progress-bar{background:rgba(255,255,255,.15);height:8px;border-radius:4px;margin-top:10px;width:100%;max-width:300px;overflow:hidden}
.progress-fill{background:#22d3ee;height:100%;border-radius:4px;transition:width .6s ease}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;background:#1e293b;color:#94a3b8}
.tab:hover{background:#334155;color:#e2e8f0}
.tab.active{background:#0ea5e9;color:#fff}
.content{background:#1e293b;border-radius:12px;padding:28px;min-height:400px}

/* Lesson grid */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.lesson-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:20px;cursor:pointer;transition:all .25s;position:relative}
.lesson-card:hover{border-color:#0ea5e9;transform:translateY(-2px);box-shadow:0 4px 20px rgba(14,165,233,.15)}
.lesson-card .num{position:absolute;top:12px;right:14px;font-size:1.8rem;font-weight:800;color:#1e293b}
.lesson-card:hover .num{color:#0ea5e9}
.lesson-card h3{color:#f1f5f9;font-size:1.05rem;margin-bottom:6px;padding-right:32px}
.lesson-card .meta{color:#64748b;font-size:.82rem}

/* Lesson detail */
.lesson-header{margin-bottom:20px}
.lesson-nav{display:flex;gap:10px;margin-bottom:16px}
.nav-btn{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 18px;cursor:pointer;color:#94a3b8;font-weight:500;font-size:.85rem;transition:all .2s}
.nav-btn:hover{border-color:#0ea5e9;color:#e2e8f0}
.nav-btn:disabled{opacity:.3;cursor:default;border-color:#1e293b}
.outcomes-box{background:#0f172a;border-radius:10px;padding:16px 20px;margin-bottom:20px}
.outcomes-box strong{color:#22d3ee;font-size:.9rem}
.outcomes-box ul{padding-left:20px;margin-top:6px}
.outcomes-box li{color:#94a3b8;font-size:.88rem;line-height:1.6}
.section-card{border-left:3px solid #0ea5e9;background:#0f172a;border-radius:0 10px 10px 0;margin-bottom:14px;overflow:hidden}
.section-card.open{border-left-color:#22d3ee}
.section-card h3{color:#f1f5f9;font-size:.95rem;padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background .2s}
.section-card h3:hover{background:rgba(255,255,255,.03)}
.section-card h3 .toggle{color:#64748b;font-size:1.1rem;transition:transform .2s}
.section-card.open h3 .toggle{transform:rotate(45deg);color:#22d3ee}
.section-card .body{color:#cbd5e1;font-size:.9rem;line-height:1.7;padding:0 18px 16px;display:none}
.section-card.open .body{display:block}
.revision-box{background:#0f172a;border-radius:10px;padding:16px 20px;margin-top:24px;border-left:3px solid #fbbf24}
.revision-box strong{color:#fbbf24;font-size:.9rem}
.revision-box ul{padding-left:20px;margin-top:6px}
.revision-box li{color:#94a3b8;font-size:.85rem;line-height:1.6;margin-bottom:4px}

/* Quiz */
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.quiz-progress .bar{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.quiz-progress .bar .fill{height:100%;background:#0ea5e9;border-radius:3px;transition:width .4s}
.quiz-progress .label{color:#64748b;font-size:.82rem;white-space:nowrap}
.quiz-question{font-size:1.05rem;font-weight:600;color:#f1f5f9;margin-bottom:18px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{padding:14px 18px;background:#0f172a;border:2px solid #1e293b;border-radius:10px;cursor:pointer;color:#cbd5e1;font-size:.92rem;transition:all .2s;text-align:left;line-height:1.4}
.quiz-opt:hover:not(.disabled){border-color:#0ea5e9}
.quiz-opt.correct{border-color:#22d3ee;background:rgba(34,211,238,.08);color:#22d3ee}
.quiz-opt.wrong{border-color:#ef4444;background:rgba(239,68,68,.08);color:#ef4444}
.quiz-opt.disabled{cursor:default;opacity:.6}
.quiz-opt.show-correct{border-color:#22d3ee;background:rgba(34,211,238,.06)}
.quiz-fb{margin-top:16px;padding:14px 18px;border-radius:10px;font-size:.9rem;line-height:1.5;display:none}
.quiz-fb.show{display:block}
.quiz-fb.correct{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:#22d3ee}
.quiz-fb.wrong{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171}
.quiz-fb .explain{color:#94a3b8;margin-top:6px;font-size:.85rem}
.quiz-continue{margin-top:16px;padding:10px 28px;background:#0ea5e9;border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem;display:none}
.quiz-continue.show{display:inline-block}
.quiz-continue:hover{background:#0284c7}
.quiz-result{text-align:center;padding:40px 20px}
.quiz-result .score-num{font-size:3.5rem;font-weight:800;color:#22d3ee}
.quiz-result .score-label{color:#94a3b8;margin-top:4px;font-size:.95rem}
.quiz-result .score-sub{color:#64748b;margin-top:8px;font-size:.85rem}
.quiz-result .btn-group{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.quiz-result .btn-group button{padding:12px 28px;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:background .2s;font-size:.9rem}
.quiz-result .btn-group .btn-retry{background:#0ea5e9;color:#fff}
.quiz-result .btn-group .btn-retry:hover{background:#0284c7}
.quiz-result .btn-group .btn-back{background:#1e293b;color:#94a3b8}
.quiz-result .btn-group .btn-back:hover{background:#334155;color:#e2e8f0}

/* Flashcards */
.flashcard-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.flashcard-3d{perspective:800px;width:100%;max-width:500px;height:260px;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s ease;transform-style:preserve-3d}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
.flashcard-front{background:#0f172a;border:1px solid #1e293b}
.flashcard-front p{font-size:1.15rem;color:#f1f5f9;font-weight:600;line-height:1.5}
.flashcard-back{background:#0f172a;border:1px solid #0ea5e9;transform:rotateY(180deg)}
.flashcard-back p{font-size:.95rem;color:#94a3b8;line-height:1.6}
.flashcard-hint{color:#64748b;font-size:.8rem}
.flashcard-progress{display:flex;gap:4px;align-items:center;justify-content:center;width:100%;max-width:500px}
.flashcard-progress .dot{width:8px;height:8px;border-radius:50%;background:#1e293b;transition:all .3s}
.flashcard-progress .dot.done{background:#0ea5e9}
.flashcard-progress .dot.active{background:#22d3ee;transform:scale(1.3)}
.flashcard-ctrl{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.flashcard-ctrl button{padding:10px 24px;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .2s;font-size:.9rem}
.flashcard-ctrl .btn-prev{background:#334155;color:#e2e8f0}
.flashcard-ctrl .btn-prev:hover{background:#475569}
.flashcard-ctrl .btn-next{background:#0ea5e9;color:#fff}
.flashcard-ctrl .btn-next:hover{background:#0284c7}
.flashcard-ctrl .btn-shuffle{background:#1e293b;color:#94a3b8;border:1px solid #334155}

@media(max-width:640px){
  .app{padding:12px}
  header{padding:16px;flex-direction:column;align-items:flex-start}
  .content{padding:16px}
  .lesson-grid{grid-template-columns:1fr}
  .flashcard-3d{height:220px}
}

/* Certificate */
.cert-wrap{max-width:700px;margin:0 auto;padding:10px;text-align:center}
.cert-paper{background:#fff;color:#1e293b;padding:40px;border-radius:16px;border:4px solid #0ea5e9;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.cert-paper .seal{font-size:4rem;margin-bottom:8px}
.cert-paper h1{font-size:1.8rem;color:#0ea5e9;margin-bottom:4px;font-weight:800}
.cert-paper .subtitle{color:#64748b;font-size:.95rem;margin-bottom:20px}
.cert-paper .award-line{font-size:1rem;color:#475569;margin:16px 0 8px}
.cert-paper .recipient{font-size:2.2rem;font-weight:800;color:#0f172a;margin:8px 0}
.cert-paper .course-name{font-size:1.1rem;color:#0ea5e9;font-weight:600;margin-bottom:16px}
.cert-paper .details{display:flex;justify-content:center;gap:24px;margin:16px 0;flex-wrap:wrap}
.cert-paper .detail-item{background:#f1f5f9;border-radius:8px;padding:10px 18px;min-width:120px}
.cert-paper .detail-item .val{font-size:1.3rem;font-weight:700;color:#0ea5e9}
.cert-paper .detail-item .lbl{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.cert-paper .footer-line{border-top:2px solid #e2e8f0;margin-top:20px;padding-top:16px;font-size:.8rem;color:#94a3b8}
.cert-actions{margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.cert-actions button{padding:12px 32px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.95rem;transition:background .2s}
.cert-actions .btn-print{background:#0ea5e9;color:#fff}
.cert-actions .btn-print:hover{background:#0284c7}
.cert-actions .btn-name{background:#1e293b;color:#94a3b8}
.cert-actions .btn-name:hover{background:#334155;color:#e2e8f0}

@media print{
  body *{visibility:hidden !important}
  .cert-wrap,.cert-wrap *{visibility:visible !important}
  .cert-wrap{position:absolute;left:0;top:0;width:100%;padding:0}
  .cert-paper{border:3px solid #0ea5e9;border-radius:0;box-shadow:none;padding:30px}
  .cert-actions,.tabs,header{display:none !important}
}
@media print and (prefers-color-scheme:dark){
  .cert-paper{background:#fff !important}
}</style>
</head>

    <div>
      <h1>GIS BIT 2324</h1>
      <p>Geographical Information Systems &mdash; JKUAT</p>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div style="text-align:right;font-size:.85rem;color:#bae6fd" id="progressText">0 / 10 lessons</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="learn"> Guided Learning</button>
    <button class="tab" data-tab="quiz"> Basic Quiz</button>
    <button class="tab" data-tab="hardquiz"> Hard Quiz</button>
    <button class="tab" data-tab="flashcards"> Flashcards</button>
    <button class="tab" data-tab="certificate"> Certificate</button>

  <div class="content" id="contentArea"></div>
</div>

<script>const LESSONS = [
  {id:1,icon:'',title:'Introduction to GIS',outcomes:['Define GIS','Describe components of a GIS','Distinguish different data types'],sections:[{title:'What is GIS?',content:'GIS is an information system which is geographic in nature. It is a computer-based tool for mapping and analyzing geographic phenomena that exist on Earth. A GIS provides facilities for data capture, data management, data manipulation and analysis, and presentation of results in both graphic and report form, with a particular emphasis on spatial data.'},{title:'Components of GIS',content:'A working GIS integrates five key components: (1) Hardware - the computer system on which GIS operates; (2) Software - provides functions to store, analyze, and display geographic information; (3) Data - the most important component, geographic and tabular data; (4) People - from technical specialists to end users who manage and apply the system; (5) Methods - implementation plans and business rules unique to each organization.'},{title:'Functional Subsystems',content:'A GIS has four main functional subsystems: (1) Data Input - converting data from paper maps into digital format (digitizing); (2) Data Storage and Retrieval - organizing data for quick access using a DBMS; (3) Data Manipulation and Analysis - the heart of GIS, defining and executing spatial and attribute procedures; (4) Data Output - generating graphic displays, maps, and tabular reports.'},{title:'GIS Process',content:'The GIS process involves six steps: 1. Define the spatial problem/question; 2. Define the GIS criteria; 3. Import or create datasets; 4. Perform GIS analysis; 5. Create the output; 6. Evaluate whether the output solves the problem. If not, refine the problem and repeat the process.'},{title:'GIS Data Types',content:'GIS uses two basic data types: (1) Spatial data - describes absolute and relative location of geographic features, coordinate-based, includes vector (points, lines, polygons) and raster (continuous surfaces like elevation); (2) Attribute data - describes characteristics of spatial features, quantitative and/or qualitative, also called tabular data (statistics, text, images).'},{title:'Classification of GIS',content:'GIS software can be classified into six groups: Professional (fully featured, e.g. ArcInfo), Desktop (map making focus, e.g. ArcView, MapInfo), Hand-held (mobile field use), Component (tool kits like MapObjects), Viewer (free display/query tools like ArcExplorer), and Internet GIS (web-based like ArcIMS, MapGuide).'},{title:'Advantages of GIS',content:'GIS explores both geographical and thematic components of data in a holistic way. It stresses geographical aspects of research questions, allows handling of large data volumes, integrates data from disparate sources, incorporates location into analysis, and provides a wide variety of visualization forms.'},{title:'Disadvantages of GIS',content:'Geographical data is expensive to acquire. The learning curve on GIS software can be long. GIS shows spatial relationships but does not provide absolute solutions. GIS originated from earth sciences and computer science, so solutions may not suit all research types.'},{title:'Approaches to GIS',content:'Three approaches exist: (1) The application approach - GIS as a tool to answer questions and support decisions; (2) The developer approach - building and customizing GIS systems; (3) The science approach - studying principles of geographic information science. These approaches are complementary.'}],revisionQs:['What is GIS? - explain the key concepts covered in this section.','Components of GIS - explain the key concepts covered in this section.','Functional Subsystems - explain the key concepts covered in this section.','GIS Process - explain the key concepts covered in this section.','GIS Data Types - explain the key concepts covered in this section.','Classification of GIS - explain the key concepts covered in this section.']},
  {id:2,icon:'',title:'GIS Software Packages',outcomes:['Explain GIS software','Distinguish between thin and thick client servers'],sections:[{title:'Desktop GIS',content:'Desktop GIS is a mapping software installed on a personal computer. It stores attribute information in tables linked to map features via themes. Maps use three basic shapes: points (discrete locations), lines (length but no width), and areas/polygons (length and width). Desktop GIS links features to attributes - clicking on a feature reveals all its stored information.'},{title:'Geobrowser',content:'A Geobrowser is a client (web or stand-alone) that accesses georeferenced data and provides multi-dimensional visualization. Google Earth is the most popular example. Capabilities include robust search, real-time monitoring, historical data access, and built-in import/export tools.'},{title:'Web-based GIS',content:'Web GIS delivers maps and GIS services on the internet using client-server architecture. It is cost-effective, easy to use, and does not require data download. Functionality is more limited than desktop GIS but excellent as data visualization tools. It uses a centralized paradigm approach.'},{title:'Thin Client Server',content:'Thin client approach: central control, easy data versioning, generally cheaper, integration possibilities. Disadvantages - large data volume, slow response time, less interactive, no local accountability. Server handles most processing; client is primarily for display.'},{title:'Thick Client Server',content:'Thick client approach: document/graphics standards not required, vector data can be used, image quality not restricted to GIF/JPEG, modern interface possible. Disadvantages - additional software requirements, platform/browser incompatibility. More processing occurs on the client side.'},{title:'GIS Data Types',content:'Two types of data: Graphic data (maps, images, drawings) and Non-graphic data (attributes describing features). Map scale determines what types of features can be represented. Points become lines become polygons as scale increases - a river can be a line at small scale or area at large scale.'},{title:'GIS Software Examples',content:'Examples include: ArcView (desktop mapping), ArcGIS (professional analysis), MapInfo Professional (business GIS), Quantum GIS (open source), Autodesk World (CAD-integrated), Intergraph GeoMedia (enterprise). Each has different strengths - the right choice depends on user needs, budget, and technical requirements.'},{title:'How GIS Applications Work',content:'GIS applications have a graphical user interface with menus, toolbars, and map display windows. They display map layers stored as files or in databases. Each layer represents real-world features. Most desktop GIS has adopted standards for user interface design and interoperability.'},{title:'Feature Representation',content:'Maps use three basic shapes: Points (discrete locations too small for areas), Lines (objects with length but too narrow for areas), and Areas (objects too large for points or lines). Map scale determines representation - a river can be a line at small scale or a polygon at large scale.'}],revisionQs:['Desktop GIS - explain the key concepts covered in this section.','Geobrowser - explain the key concepts covered in this section.','Web-based GIS - explain the key concepts covered in this section.','Thin Client Server - explain the key concepts covered in this section.','Thick Client Server - explain the key concepts covered in this section.','GIS Data Types - explain the key concepts covered in this section.']},
  {id:3,icon:'',title:'Maps, Scale & Projections',outcomes:['Define map scale and coordinate systems','Explain map projections','Describe spatial data models'],sections:[{title:'Map Scale',content:'Map scale is the ratio of map distance to ground distance. It can be expressed as a representative fraction (RF) like 1:10,000 (unit neutral), a verbal statement, or a scale bar. Large-scale maps (e.g. 1:1,000) show small areas in great detail; small-scale maps (e.g. 1:1,000,000) show large areas with less detail.'},{title:'Coordinate Systems',content:'The Geographic Coordinate System (GCS) uses latitude and longitude on a sphere/spheroid. Latitude from equator (0) to poles (90 N/S). Longitude from Prime Meridian (0) to 180 E/W. Coordinates can be DMS or Decimal Degrees. DMS to DD: degrees + minutes/60 + seconds/3600.'},{title:'Datums',content:'A datum specifies orientation and origin of latitude/longitude lines relative to Earth\'s center or spheroid. Local datums (e.g. NAD83) match closely to local area. Global WGS84 uses Earth\'s center as origin for worldwide consistency, though may be less accurate locally.'},{title:'Map Projections',content:'Map projections transform the 3D spherical Earth into 2D planar surfaces. Three projection surfaces: plane (azimuthal - good for polar regions), cylinder (cylindrical - e.g. Mercator), cone (conic - good for mid-latitude). Every projection distorts some property.'},{title:'Vector Data Model',content:'Vector data stores features as points (0-dimensional), lines/arcs (1-dimensional), and polygons (2-dimensional). Topologic structure stores spatial relationships (connectivity, adjacency). The spaghetti model stores features without explicit topology for simpler display.'},{title:'Raster Data Model',content:'Raster data uses a grid of cells with values representing features. Cell size determines resolution. Smaller cells = more detail but larger files. Advantages: simple data structure, easy integration with remote sensing. Disadvantages: large file sizes, less precise boundaries.'},{title:'Entity Dimensions',content:'Spatial features classified by dimension: Points (zero dimensionality, no length/width), Lines (one dimension, length but no width), Polygons (two dimensions, length and width), Surfaces (three dimensions, length, width, height). Surfaces have infinite values and represent continuous data like elevation.'},{title:'Attribute Data Models',content:'For raster, cell value is the attribute. For vector, attribute records link to features by unique ID. Common models: Tabular (flat file), Hierarchical (one-to-many), Network (many-to-many), Relational (linked tables), and Object Oriented. Relational is most common in modern GIS.'},{title:'Image Data in GIS',content:'Image data differs from raster - it represents pictorial data like satellite scenes and scanned photographs. Images are used as background display or graphic attributes. Remote sensing software uses image data for classification. Images must often be converted to raster format for analytical use.'}],revisionQs:['Map Scale - explain the key concepts covered in this section.','Coordinate Systems - explain the key concepts covered in this section.','Datums - explain the key concepts covered in this section.','Map Projections - explain the key concepts covered in this section.','Vector Data Model - explain the key concepts covered in this section.','Raster Data Model - explain the key concepts covered in this section.']},
  {id:4,icon:'',title:'Tabular Data & Queries',outcomes:['Define data modeling','Understand querying GIS data'],sections:[{title:'Data Modeling',content:'Data modeling defines features to be included in the database, their attributes and relationships, and their internal representation. It involves developing conceptual, logical, and physical models. Outcomes include a comprehensive data dictionary. Accuracy standards should be defined as part of database design.'},{title:'Database Models',content:'Several database models: Flat (single large table), Hierarchical (one-to-many), Network (many-to-many), Relational (most common, tables linked by keys), and Object Oriented (newer, gaining popularity). Relational is most common in modern GIS.'},{title:'Attribute Queries',content:'Attribute queries select features using attribute data, typically with SQL. Results can be mapped or presented in tabular form. Can produce subsets of data or choropleth maps showing thematic distributions across areas.'},{title:'Spatial Queries',content:'Spatial queries use location relationships to find features. Users click features to discover attribute values, or select features based on spatial relationships (within, contains, touches, crosses). Combining attribute and spatial queries creates a powerful exploration tool.'},{title:'Procedural Manuals',content:'A procedural manual defines steps for developing and processing digital spatial data, ensuring consistency across different technicians. It defines recurring analytical work, such as methods to reconcile past census data with new administrative boundaries.'},{title:'Accuracy Standards',content:'Accuracy standards should be defined as part of database design. While often not critical in census mapping (hand-drawn maps still used in many countries), accuracy becomes essential when combining census maps with higher-accuracy data from other sources.'},{title:'Procedural Manuals',content:'A procedural manual defines steps for processing digital spatial data, ensuring consistency across different technicians. It defines recurring analytical work, such as methods to reconcile past census data with new boundaries after administrative changes.'},{title:'Accuracy Standards',content:'Accuracy standards should be part of database design. While often not critical in census mapping (hand-drawn maps are still used), accuracy becomes essential when combining census maps with higher-accuracy data from other sources.'},{title:'One-Attribute Raster Maps',content:'Raster GIS often uses one-attribute maps: a species map, height map, density map separately. This contrasts with vector\'s multiple-attribute model where one polygon has all attributes. This enables quantitative analysis through map algebra.'}],revisionQs:['Data Modeling - explain the key concepts covered in this section.','Database Models - explain the key concepts covered in this section.','Attribute Queries - explain the key concepts covered in this section.','Spatial Queries - explain the key concepts covered in this section.','Procedural Manuals - explain the key concepts covered in this section.','Accuracy Standards - explain the key concepts covered in this section.']},
  {id:5,icon:'',title:'Data Sources & Collection',outcomes:['Identify sources of geographical data','Know geographical data collectors and providers'],sections:[{title:'Sources of Spatial Data',content:'Raw geographical data comes from: hard copy maps (most popular source), aerial photographs, remotely-sensed imagery (satellite), existing digital data files, and field survey methods. 60-80% of GIS implementation costs lie in data acquisition and database development.'},{title:'Remote Sensing Data',content:'Stereo aerial photographs provide overlapping images for mapping geology, soil, vegetation, and land cover. Digital photogrammetry and orthophoto mapping provide terrain elevation and land cover data. Satellite scanners include passive (sensing reflected/emitted radiation) and active (radar, LiDAR, sonar).'},{title:'Data Collectors and Providers',content:'Systematic data collectors: government agencies with mapping/cadastral mandates. Ad hoc collectors: private surveyors and researchers. Some data is free (elevations, roads, towns). Government data typically inexpensive but may vary in quality.'},{title:'Creating Digital Datasets',content:'Manual data input: (1) Entering spatial data using digitizers, scanners, stereoplotters; (2) Entering attribute data from paper records; (3) Verifying and editing - checking for errors like dangling chains, unlabelled polygons; (4) Linking spatial to attribute data using common identifiers.'},{title:'Digitizing Errors',content:'Common errors: dangling chains (undershoots/overshoots), unlabelled polygons (duplicate digitizing of single chain), conflicting labels (multiple seed points for one polygon), line segments with same left/right labels, data scaling problems. Corrected through editing tools.'},{title:'Data Compatibility',content:'When acquiring data ensure: currency, recording method, scale, georeferencing system, collection technique, sampling strategy, data quality, classification methods, and mapping unit size. All spatial data must be in a common coordinate frame through georeferencing.'},{title:'Data Transfer Methods',content:'Data may need encoding from source to target format. Interoperability standards enable reading other formats. Remote sensing data may need pre-processing: resolution adjustment, cartographic projection, classification, and raster-vector conversion.'},{title:'Field Survey Methods',content:'Traditional surveys record sample values at known locations using various instruments. GPS receivers now enable precise location recording during field data collection, enabling accurate integration with other spatial datasets.'}],revisionQs:['Sources of Spatial Data - explain the key concepts covered in this section.','Remote Sensing Data - explain the key concepts covered in this section.','Data Collectors and Providers - explain the key concepts covered in this section.','Creating Digital Datasets - explain the key concepts covered in this section.','Digitizing Errors - explain the key concepts covered in this section.']},
  {id:6,icon:'',title:'Spatial Data Files',outcomes:['Explain spatial data files','Describe presentation of data files'],sections:[{title:'Characteristics of Spatial Data Files',content:'Spatial data files store georeferenced information defining location. Each file is a digital representation of similar geographic features. Features can be real physical entities (lakes, rivers, roads) or conceptual (census boundaries, zoning). Each file has shapes, a tabular database, and a coordinate system.'},{title:'Shapefile Format',content:'The shapefile is the most common vector format, consisting of at least three files: .shp (geometry), .dbf (attributes), .shx (index). Features are points, lines, or polygons. Limitations: no topology, 10-character field names, 2GB limit, multiple files required.'},{title:'Coverage Format',content:'Coverages were the original ESRI spatial data format using topologic data structure. A single coverage comprises two folders with many files. While superseded by shapefiles and geodatabases, coverages are still widely available on data download websites.'},{title:'Grid and Image Data',content:'Grids are raster formats using rows and columns of pixels. Integer grids have pixel values with textual descriptions; floating point grids use decimals. Image formats (.jpg, .tif, .bil) can be georeferenced and orthorectified, becoming orthophotographs.'},{title:'GeoDatabase Format',content:'The GeoDatabase (GDB) is the newest ESRI format. All spatial data resides in a single file, eliminating files across folders. GDBs have greater intelligence and support topology, domains, subtypes, and relationship classes.'},{title:'Naming Conventions',content:'Rules: Keep names short (8-15 chars), do not use spaces or special characters, use underscores or camelCase, avoid starting with numbers, be descriptive but concise. Consistent naming ensures data remains understandable to all users.'},{title:'Shapefile Limitations',content:'Shapefiles have no topology, 10-character field names, 2GB size limit, require multiple files, no raster support, and poor performance with large datasets. The GeoDatabase addresses these with topology, larger capacity, and single-file storage.'},{title:'Raster Resolution',content:'Cell size selection is critical: too coarse over-generalizes, too fine creates large volumes. Original data accuracy should determine cell size. Vector-raster conversion requires knowing original scale before setting conversion cell size.'},{title:'Orthophotographs',content:'Images become spatial data when georeferenced with ground coordinates. Orthorectification removes distortions from terrain, camera tilt, and edge effects. Orthorectified and georeferenced images are called orthophotographs.'}],revisionQs:['Characteristics of Spatial Data Files - explain the key concepts covered in this section.','Shapefile Format - explain the key concepts covered in this section.','Coverage Format - explain the key concepts covered in this section.','Grid and Image Data - explain the key concepts covered in this section.','GeoDatabase Format - explain the key concepts covered in this section.','Naming Conventions - explain the key concepts covered in this section.']},
  {id:7,icon:'',title:'Cartographic Design',outcomes:['Understand principles of cartographic design','Explain map composition and generalization'],sections:[{title:'Use of Color',content:'Primary function: make map information visually distinguishable. Three dimensions: Hue (dominant wavelength - for qualitative differences), Value (lightness/darkness - for quantitative), Saturation (purity of hue). Color choice is critical for readability.'},{title:'Use of Text and Symbols',content:'Descriptive text gives titles, legends, and labels. Text characteristics: family, style, font, color. Symbols: Marker (.mrk) for points, Line (.lin) for arcs, Shade (.shd) for polygons, Text annotation (.txt). GIS software supplies predefined symbol sets.'},{title:'Map Composition',content:'Key elements: Visual balance (location/proportionality), Clarity (generalization), Hierarchy (font/symbol size), Contrast (color/shading), Context (data layer selection), Text (annotation). Map design blends science and art - subjectivity and creativity matter.'},{title:'Cartographic Generalization',content:'Generalization reduces data complexity at smaller scales. Operations: simplification, smoothing, aggregation, amalgamation, merging, collapse, refinement, typification, exaggeration, displacement, classification. Problems: congestion, coalescence, conflict, complication, imperceptibility.'},{title:'Map-to-Page Transformation',content:'Four concepts: Physical page (display surface), Graphics page (where map is drawn), Map limits (where features are drawn), Map extent (Earth area displayed). Cartography blends science and art - creativity plays an important role.'},{title:'Map-to-Page Transformation',content:'Four concepts: Physical page (display surface), Graphics page (where map is drawn), Map limits (where features are drawn), Map extent (Earth area displayed). Cartography blends science and art - creativity plays an important role in map quality.'},{title:'Geographic Contents',content:'Elements governed by: Map theme, Map coverage, Map scale. Visual considerations: balance, clarity, hierarchy, contrast, context, and text. These ensure maps communicate information effectively to the reader.'},{title:'Label Placement',content:'Good label placement ensures readability and associates labels with map elements. Labels must not overlap features or other labels. GIS provides automated placement but manual adjustment is needed for quality. Text characteristics include family, style, size, and color.'}],revisionQs:['Use of Color - explain the key concepts covered in this section.','Use of Text and Symbols - explain the key concepts covered in this section.','Map Composition - explain the key concepts covered in this section.','Cartographic Generalization - explain the key concepts covered in this section.','Map-to-Page Transformation - explain the key concepts covered in this section.']},
  {id:8,icon:'',title:'GIS Applications',outcomes:['Understand real-world GIS applications','Explain GIS analysis techniques'],sections:[{title:'Wildlife Habitat Assessment',content:'GIS can calculate home ranges and territories. Slope data eliminates steep areas; elevation eliminates unsuitable areas. Juxtaposition measures different vegetation types; interspersion measures edge values - both critical as food/cover must be nearby. Proximity includes distances to water and roads.'},{title:'Hydrological Modeling',content:'Predicting snowmelt runoff uses regression with spatial data: snow-covered area, snow-water equivalent, elevation, slope, aspect, vegetation, thermal emittance, near-infrared reflectance. Best model has highest correlation coefficient.'},{title:'Site Selection Applications',content:'GIS supports: helicopter landing zones, amphibious planning (water depth), buffer zones, flight planning, battlefield visualization, cross-country movement, route planning, intervisibility studies, facilities management, airfield assessment, road network analysis, observation post siting.'},{title:'GIS as a Decision Tool',content:'GIS is a powerful decision-making tool, but just a tool. There is great temptation to rely too heavily on the computer and stop thinking. There is also a tendency to collect too much spatial data - one more layer is not always the answer.'},{title:'Military and Defense GIS',content:'Military GIS: helicopter landing zone selection, amphibious assault planning, buffer zones, flight planning, battlefield visualization, cross-country movement analysis, route planning, intervisibility studies, observation post siting. These use terrain analysis and viewshed.'},{title:'Military GIS',content:'Military applications: helicopter landing zone selection, amphibious planning, buffer zones, flight planning, battlefield visualization, route planning, intervisibility studies, and observation post siting. These use terrain analysis, viewshed, and network routing.'},{title:'Infrastructure Management',content:'GIS supports facilities management, airfield assessment, road network analysis, communication propagation modeling, and perspective view generation. These help maintain and analyze physical assets across geographic areas.'},{title:'Wildlife Habitat Models',content:'Habitat models combine spatial data to predict quality. Variables include vegetation juxtaposition, interspersion, distances to water/roads, slope, and elevation. Weighted analysis determines good, marginal, and poor habitat areas.'}],revisionQs:['Wildlife Habitat Assessment - explain the key concepts covered in this section.','Hydrological Modeling - explain the key concepts covered in this section.','Site Selection Applications - explain the key concepts covered in this section.','GIS as a Decision Tool - explain the key concepts covered in this section.','Military and Defense GIS - explain the key concepts covered in this section.']},
  {id:9,icon:'',title:'Implementation & Future of GIS',outcomes:['Understand GIS implementation issues','Explain GIS evaluation and selection'],sections:[{title:'GIS Software Options',content:'No single best GIS. About 10 major commercial offerings exist. Evaluate strictly in terms of user needs, work procedures, production requirements, and organizational context. An experienced GIS consultant plays a valuable role. Benchmarking with real data is the accepted approach.'},{title:'Justification and Expectations',content:'GIS is a long-term investment with steep learning curve. Plans must address: acquisition costs, data requirements, database design, data loading, timetable, system life cycle, operating procedures, staffing, training, application development. Benefits include better storage, efficient retrieval, better decisions.'},{title:'Common Implementation Pitfalls',content:'Key pitfalls: failure to identify all users, failure to match GIS capability to needs, failure to identify total costs (ongoing far exceed acquisition), failure to conduct pilot study, giving implementation to EDP instead of GIS analysts, failure to consider training.'},{title:'Implementation Process',content:'Six-phase process: 1. Creating awareness through workshops; 2. Identifying requirements via user needs analysis; 3. System evaluations with benchmarks; 4. Justifying acquisition through cost-benefit analysis; 5. System acquisition and start-up; 6. Operational phase with ongoing maintenance.'},{title:'User Needs Analysis',content:'Identifies system users and required information products. Needs translate into functional requirements. Experienced GIS consultants play a major role in this phase. Prioritization of products and data requirements is essential for successful implementation.'},{title:'User Needs Analysis',content:'Identifies system users and required information products. Needs translate into functional requirements: processing functions, system capabilities, and hardware. Experienced GIS consultants play a major role in this phase of implementation.'},{title:'System Evaluation',content:'Stages: (1) Identify candidates via demonstrations and vendor literature; (2) Short-list with low-level assessment; (3) High-level assessment with rating matrices; (4) Benchmark with real data. User-friendly systems have clear commands, error messages, and help facilities.'},{title:'Cost-Benefit Analysis',content:'Consider: database development, maintenance/training needs, organizational requirements. Benefits include: better data storage, efficient retrieval, rapid analysis of alternatives, and better decisions. Intangible benefits must also be evaluated.'}],revisionQs:['GIS Software Options - explain the key concepts covered in this section.','Justification and Expectations - explain the key concepts covered in this section.','Common Implementation Pitfalls - explain the key concepts covered in this section.','Implementation Process - explain the key concepts covered in this section.','User Needs Analysis - explain the key concepts covered in this section.']},
  {id:10,icon:'',title:'GIS Summary & Review',outcomes:['Review key GIS concepts','Integrate knowledge across all lessons'],sections:[{title:'GIS Core Concepts Review',content:'A GIS integrates hardware, software, data, people, methods to capture, store, manipulate, analyze, and display georeferenced information. Spatial data comes in vector (points, lines, polygons) and raster (grid cells) formats. Attribute data describes characteristics.'},{title:'Data Lifecycle',content:'The GIS data lifecycle: acquisition (maps, remote sensing, surveys), input (digitizing, scanning), storage (shapefiles, geodatabases), manipulation (projections, conversions), analysis (queries, overlays, buffers, interpolation), output (maps, reports, visualizations).'},{title:'Spatial Analysis Techniques',content:'Key techniques: Buffer analysis (proximity zones), Overlay analysis (intersect, union, clip), Network analysis (shortest path), Terrain analysis (slope, aspect, hillshade), Interpolation (IDW, kriging), Map algebra (raster calculations), Multi-criteria analysis (weighted overlay).'},{title:'GIS Standards and Interoperability',content:'OGC develops interoperability standards. WMS serves map images; WFS serves vector features. Metadata standards (ISO 19115) document data quality and lineage. Data dictionaries define field names and types. Interoperability enables different systems to exchange data.'},{title:'Emerging Trends',content:'Current trends: Cloud GIS (hosted online), Real-time GIS (live sensor/GPS data), Big Data GIS (massive spatial datasets from IoT), Digital Twins (3D digital replicas), Mobile GIS, Location-based Services. Ethical concerns include locational privacy and data sovereignty.'},{title:'GIS Ethics and Privacy',content:'Locational privacy concerns grow as GPS integrates into mobile devices. Questions about rights to location data are emerging. Data sovereignty concerns ownership of geographic data, particularly from government agencies.'},{title:'OGC Standards',content:'WMS serves map images, WFS serves vector features, WCS serves raster data. ISO 19115 is the international metadata standard. FGDC is the US metadata standard. These ensure data sharing across different systems and organizations.'},{title:'Implementation Success Factors',content:'Success requires: adequate staff training, realistic priorities, well-defined milestones, proper time and training resources. The learning curve threshold is about two years. GIS acquisition based on defined user needs is more likely to succeed.'}],revisionQs:['GIS Core Concepts Review - explain the key concepts covered in this section.','Data Lifecycle - explain the key concepts covered in this section.','Spatial Analysis Techniques - explain the key concepts covered in this section.','GIS Standards and Interoperability - explain the key concepts covered in this section.','Emerging Trends - explain the key concepts covered in this section.']},

function renderLessons() {
  const c = document.getElementById('contentArea');
  c.innerHTML = '<div class="lesson-grid">' + LESSONS.map((l, i) =>
    '<div class="lesson-card" onclick="showLesson('+i+')">' +
      '<div class="num">'+(i+1)+'</div>' +
      '<h3>'+l.title+'</h3>' +
      '<div class="meta">'+l.sections.length+' sections \u00b7 '+l.outcomes.length+' outcomes</div>' +
    '</div>'
  ).join('') + '</div>';
}

function showLesson(idx) {
  const l = LESSONS[idx];
  const c = document.getElementById('contentArea');
  let h = '<div class="lesson-nav">';
  h += '<button class="nav-btn" onclick="showLesson('+(idx-1)+')"'+(idx===0?' disabled':'')+'>\u2190 Prev</button>';
  h += '<button class="nav-btn" onclick="showLesson('+(idx+1)+')"'+(idx>=LESSONS.length-1?' disabled':'')+'>Next \u2192</button>';
  h += '</div>';
  h += '<div class="lesson-header"><h2 style="font-size:1.3rem;color:#f1f5f9">Lesson '+(idx+1)+': '+l.title+'</h2></div>';
  h += '<div class="outcomes-box"><strong>Learning Outcomes</strong><ul>';
  l.outcomes.forEach(o => { h += '<li>'+o+'</li>'; });
  h += '</ul></div>';
  l.sections.forEach((s, i) => {
    h += '<div class="section-card'+(i===0?' open':'')+'">';
    h += '<h3 onclick="toggleSection('+idx+','+i+')">'+s.title+' <span class="toggle">+</span></h3>';
    h += '<div class="body" id="sec-'+idx+'-'+i+'">'+s.content+'</div></div>';
  });
  h += '<div class="revision-box"><strong>Revision Questions</strong><ul>';
  l.revisionQs.forEach(q => { h += '<li>'+q+'</li>'; });
  h += '</ul></div>';
  h += '<div class="lesson-nav" style="margin-top:24px">';
  h += '<button class="nav-btn" onclick="showLesson('+(idx-1)+')"'+(idx===0?' disabled':'')+'>\u2190 Prev</button>';
  h += '<button class="nav-btn" onclick="showLesson('+(idx+1)+')"'+(idx>=LESSONS.length-1?' disabled':'')+'>Next \u2192</button>';
  h += '</div>';
  c.innerHTML = h;
  const v = JSON.parse(localStorage.getItem('gv')||'[]');
  if(!v.includes(idx)){v.push(idx);localStorage.setItem('gv',JSON.stringify(v))}
  updateProgress();
}

function toggleSection(lidx, sidx) {
  const card = document.getElementById('sec-'+lidx+'-'+sidx).parentNode;
  card.classList.toggle('open');
}

function updateProgress() {
  const v = JSON.parse(localStorage.getItem('gv')||'[]');
  const pct = Math.round(v.length/LESSONS.length*100);
  document.getElementById('progressFill').style.width = Math.min(pct,100)+'%';
  document.getElementById('progressText').textContent = v.length+' / '+LESSONS.length+' lessons';
}
let quizData = null, quizIdx = 0, quizScore = 0, quizAnswered = false, quizType = '';

function shuffleArray(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function startQuiz(type) {
  quizType = type;
  quizData = type === 'quiz' ? [...QUIZ] : [...HARD_QUIZ];
  shuffleArray(quizData);
  quizIdx = 0; quizScore = 0; quizAnswered = false;
  showQuizQuestion();
}

function showQuizQuestion() {
  const c = document.getElementById('contentArea');
  if (quizIdx >= quizData.length) {
    const pct = Math.round(quizScore/quizData.length*100);
    c.innerHTML = '<div class="quiz-result"><div class="score-num">'+quizScore+'/'+quizData.length+'</div>' +
      '<div class="score-label">'+pct+'% correct</div>' +
      '<div class="score-sub">'+(pct>=80?'Great job!':pct>=50?'Good effort!':'Keep practicing!')+'</div>' +
      '<div class="btn-group"><button class="btn-retry" onclick="startQuiz(\''+quizType+'\')">Retry</button>' +
      '<button class="btn-back" onclick="switchTab(\''+quizType+'\')">Back</button></div></div>';
    return;
  }
  const q = quizData[quizIdx];
  const opts = shuffleArray([...q.options]);
  let h = '<div class="quiz-progress"><div class="bar"><div class="fill" style="width:'+(quizIdx/quizData.length*100)+'%"></div></div>' +
    '<span class="label">'+(quizIdx+1)+'/'+quizData.length+'</span></div>';
  h += '<div class="quiz-question">'+q.q+'</div><div class="quiz-opts">';
  opts.forEach((o, i) => {
    h += '<div class="quiz-opt" id="qo-'+i+'" onclick="checkAnswer('+i+','+(o===q.a)+')">'+
      String.fromCharCode(97+i)+'. '+o+'</div>';
  });
  h += '</div><div class="quiz-fb" id="quizFb"></div><button class="quiz-continue" id="quizCont">Continue</button>';
  c.innerHTML = h;
  quizAnswered = false;
}

function checkAnswer(idx, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.classList.add('disabled'));
  const fb = document.getElementById('quizFb');
  if (correct) {
    quizScore++;
    opts[idx].classList.add('correct');
    fb.className = 'quiz-fb correct show';
    fb.innerHTML = '<strong>Correct!</strong><div class="explain">'+(quizData[quizIdx].e||'')+'</div>';
  } else {
    opts[idx].classList.add('wrong');
    const a = quizData[quizIdx].a; opts.forEach((o)=>{if(o.textContent.trim().slice(2).trim()===a)o.classList.add('show-correct')});
    fb.className = 'quiz-fb wrong show';
    fb.innerHTML = '<strong>Incorrect.</strong> The answer was: '+(quizData[quizIdx].a||'')+
      '<div class="explain">'+(quizData[quizIdx].e||'')+'</div>';
  }
  document.getElementById('quizCont').classList.add('show');
  document.getElementById('quizCont').onclick = function(){quizIdx++;showQuizQuestion()};
}

let fIdx = 0, fFlipped = false, fShuffled = [];

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');
  if (tabName === 'learn') { updateProgress(); renderLessons(); }
  else if (tabName === 'quiz') startQuiz('quiz');
  else if (tabName === 'hardquiz') startQuiz('hard');
  else if (tabName === 'flashcards') startFlashcards();
  else if (tabName === 'certificate') showCertificate();
}

function showCertificate() {
  let name = localStorage.getItem('gcName') || '';
  const v = JSON.parse(localStorage.getItem('gv')||'[]');
  const pct = Math.round(v.length/LESSONS.length*100);
  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const c = document.getElementById('contentArea');
  c.innerHTML =
    '<div class="cert-wrap">' +
      '<div class="cert-paper">' +
        '<div class="seal">&#127891;</div>' +
        '<h1>Certificate of Completion</h1>' +
        '<div class="subtitle">Geographical Information Systems</div>' +
        '<div class="award-line">This certifies that</div>' +
        '<div class="recipient">'+(name||'Your Name')+'</div>' +
        '<div class="award-line">has successfully completed the course</div>' +
        '<div class="course-name">GIS BIT 2324 &mdash; JKUAT</div>' +
        '<div class="details">' +
          '<div class="detail-item"><div class="val">'+v.length+' / '+LESSONS.length+'</div><div class="lbl">Lessons</div></div>' +
          '<div class="detail-item"><div class="val">'+pct+'%</div><div class="lbl">Progress</div></div>' +
          '<div class="detail-item"><div class="val">'+today+'</div><div class="lbl">Date</div></div>' +
        '</div>' +
        '<div class="footer-line">Issued by JKUAT &mdash; Department of Geomatics Engineering &amp; GIS</div>' +
      '</div>' +
      '<div class="cert-actions">' +
        '<button class="btn-print" onclick="printCertificate()">&#128424; Print / Save as PDF</button>' +
        '<button class="btn-name" onclick="setName()">&#9998; Edit Name</button>' +
      '</div>' +
    '</div>';
}

function printCertificate() {
  window.print();
}

function setName() {
  const n = prompt('Enter your name for the certificate:', localStorage.getItem('gcName')||'');
  if (n && n.trim()) { localStorage.setItem('gcName', n.trim()); showCertificate(); }
}

function startFlashcards() {
  fShuffled = shuffleArray([...FLASHCARDS]);
  fIdx = 0; fFlipped = false;
  showFlashcard();
}

function showFlashcard() {
  const c = document.getElementById('contentArea');
  if (fIdx >= fShuffled.length) {
    c.innerHTML = '<div class="quiz-result"><div class="score-num">Done!</div>' +
      '<div class="score-label">Reviewed all '+fShuffled.length+' cards</div>' +
      '<div class="btn-group"><button class="btn-retry" onclick="startFlashcards()">Restart</button>' +
      '<button class="btn-back" onclick="switchTab(\'flashcards\')">Back</button></div></div>';
    return;
  }
  const card = fShuffled[fIdx];
  let dots = '';
  for (let i = 0; i < fShuffled.length; i++) {
    dots += '<div class="dot'+(i<fIdx?' done':'')+(i===fIdx?' active':'')+'"></div>';
  }
  c.innerHTML = '<div class="flashcard-wrap">' +
    '<div class="flashcard-3d" onclick="flipCard()">' +
      '<div class="flashcard-inner" id="fci"><div class="flashcard-face flashcard-front"><p>'+card.front+'</p></div>' +
      '<div class="flashcard-face flashcard-back"><p>'+card.back+'</p></div></div></div>' +
    '<div class="flashcard-hint">Click the card to flip</div>' +
    '<div class="flashcard-progress">'+dots+'</div>' +
    '<div class="flashcard-ctrl">' +
      '<button class="btn-prev" onclick="prevCard()">\u2190 Prev</button>' +
      '<button class="btn-shuffle" onclick="startFlashcards()">Shuffle</button>' +
      '<button class="btn-next" onclick="nextCard()">Next \u2192</button></div></div>';
  fFlipped = false;
}

function flipCard() {
  document.getElementById('fci').classList.toggle('flipped');
  fFlipped = !fFlipped;
}

function nextCard() { if (fIdx < fShuffled.length-1) { fIdx++; fFlipped=false; showFlashcard(); } }
function prevCard() { if (fIdx > 0) { fIdx--; fFlipped=false; showFlashcard(); } }

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    switchTab(this.dataset.tab);
  });
});
updateProgress(); renderLessons();
</script>
